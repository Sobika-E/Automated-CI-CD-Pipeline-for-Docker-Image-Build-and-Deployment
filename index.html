<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN CONTAINER */
.container {
    width: 900px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    color: white;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 25px;
}

.header h1 {
    font-size: 30px;
}

.header p {
    font-size: 14px;
    color: #e0e7ff;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* STATUS COLORS */
.success { color: #22c55e; }
.failed { color: #ef4444; }
.running { color: #facc15; }

/* BUTTONS */
.links {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
}

.btn {
    padding: 10px 15px;
    border-radius: 8px;
    background: rgba(255,255,255,0.2);
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: rgba(255,255,255,0.4);
}

/* SECTION */
.section {
    margin-top: 25px;
}

/* PIPELINE */
.stage {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
}

/* DOCKER */
.container-box {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🚀 DevOps Jenkins Project</h1>
        <p>CI/CD Monitoring Dashboard</p>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Build Status</h3>
            <p id="status" class="running">Loading...</p>
        </div>

        <div class="card">
            <h3>Build Number</h3>
            <p id="buildNumber">--</p>
        </div>

        <div class="card">
            <h3>Server</h3>
            <p class="success">Running</p>
        </div>
    </div>

    <div class="links">
        <a href="http://localhost:8080" target="_blank" class="btn">Jenkins</a>
        <a href="http://localhost:8080/job/devops-project" target="_blank" class="btn">Pipeline</a>
        <a href="https://github.com/SUJITH-NS/devrewjen" target="_blank" class="btn">GitHub</a>
    </div>

    <div class="section">
        <h3>⚙️ Pipeline Stages</h3>
        <div id="pipeline"></div>
    </div>

    <div class="section">
        <h3>🐳 Docker Containers</h3>
        <div id="docker"></div>
    </div>

</div>

<script>
const API = "http://localhost:5000";

// STATUS
async function getStatus() {
    try {
        const res = await fetch(`${API}/jenkins/status`);
        const data = await res.json();

        let cls = "running";
        let text = "RUNNING";

        if (data.result === "SUCCESS") {
            cls = "success";
            text = "SUCCESS";
        } else if (data.result === "FAILURE") {
            cls = "failed";
            text = "FAILED";
        }

        document.getElementById("status").innerText = text;
        document.getElementById("status").className = cls;
        document.getElementById("buildNumber").innerText = "#" + data.number;

    } catch {
        document.getElementById("status").innerText = "OFFLINE";
    }
}

// PIPELINE
async function getPipeline() {
    try {
        const res = await fetch(`${API}/jenkins/pipeline`);
        const data = await res.json();

        let html = "";
        data.stages.forEach(s => {
            html += `<div class="stage">${s.name} - ${s.status}</div>`;
        });

        document.getElementById("pipeline").innerHTML = html;

    } catch {
        document.getElementById("pipeline").innerText = "No data";
    }
}

// DOCKER
async function getDocker() {
    try {
        const res = await fetch(`${API}/docker`);
        const data = await res.json();

        let html = "";
        data.forEach(c => {
            html += `<div class="container-box">${c.Names} - ${c.Status}</div>`;
        });

        document.getElementById("docker").innerHTML = html;

    } catch {
        document.getElementById("docker").innerText = "Docker not available";
    }
}

setInterval(() => {
    getStatus();
    getPipeline();
    getDocker();
}, 5000);

getStatus();
getPipeline();
getDocker();
</script>

</body>
</html>
